name: Java CI with Maven and Spring Boot

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest # Sử dụng máy ảo Ubuntu sạch của GitHub

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # Bước 1: Lấy code về máy ảo
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4 # Bước 2: Cài đặt Java 17
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test with Maven
      run: |
        cd calculator-app
        # Bước 3: Biên dịch code, chạy thử Unit Test và đóng gói thành file .jar hoàn chỉnh
        mvn clean package