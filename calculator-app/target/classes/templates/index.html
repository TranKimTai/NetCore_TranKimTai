<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Máy Tính Bỏ Túi - Bài Tập CI/CD</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .calculator-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #007bff; border: none; color: white; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #0056b3; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 6px; text-align: center; font-size: 18px; font-weight: bold; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="calculator-box">
    <h2>🧮 MÁY TÍNH MINI</h2>
    
    <form action="/calculate" method="post">
        <div class="form-group">
            <label>Số thứ nhất (A):</label>
            <input type="number" name="num1" th:value="${num1}" required />
        </div>
        
        <div class="form-group">
            <label>Phép tính:</label>
            <select name="operator">
                <option value="add" th:selected="${operator == 'add'}">➕ Cộng (+)</option>
                <option value="subtract" th:selected="${operator == 'subtract'}">➖ Trừ (-)</option>
                <option value="multiply" th:selected="${operator == 'multiply'}">✖ Nhân (*)</option>
                <option value="divide" th:selected="${operator == 'divide'}">➗ Chia (/)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Số thứ hai (B):</label>
            <input type="number" name="num2" th:value="${num2}" required />
        </div>
        
        <button type="submit">Tính Kết Quả</button>
    </form>

    <div class="result-box success" th:if="${result != null and error == null}">
        Kết quả: <span th:text="${result}">0</span>
    </div>

    <div class="result-box danger" th:if="${error != null}" th:text="${error}">
        Có lỗi xảy ra!
    </div>
</div>

</body>
</html>
